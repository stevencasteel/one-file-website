name: Code Quality, Build & Deploy Validation

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Grant permissions required for deploying to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent concurrent deployments from colliding
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Run Build Pipeline (Lint + Typecheck + Compile)
        run: npm run build

      - name: Setup Pages Configuration
        if: github.event_name == 'push'
        uses: actions/configure-pages@v4

      - name: Upload Compiled Assets as Pages Artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

      - name: Deploy to GitHub Pages Live Site
        id: deployment
        if: github.event_name == 'push'
        uses: actions/deploy-pages@v4
