<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steven Casteel // Digital Media Archive</title>
  
  <!-- Tailwind CSS & Google Fonts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            void: '#050505',
            ink: '#0a0a0a',
            panel: '#111114',
            fog: '#888888',
            muted: '#737a86',
            light: '#f2f2f2',
            primary: '#22c55e',
            'primary-400': '#4ade80'
          },
          fontFamily: {
            display: ['"Bricolage Grotesque"', 'sans-serif'],
            body: ['"Recursive"', 'sans-serif'],
            mono: ['"Recursive"', 'monospace']
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wdth,wght@12..96,75..100,200..800&family=Recursive:slnt,wght,CASL,MONO@-15..0,300..1000,0..1,0..1&display=swap" rel="stylesheet">
  
  <!-- Import Map -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.3.1",
        "react-dom": "https://esm.sh/react-dom@18.3.1",
        "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
        "htm": "https://esm.sh/htm@3.1.1",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0",
        "lenis": "https://esm.sh/lenis@1.1.13",
        "media-data": "./merge_later/media_data.js",
        "animejs": "https://esm.sh/animejs@3.2.2"
      }
    }
  </script>
  
  <!-- External CSS Styles -->
  <link rel="stylesheet" href="./merge_later/styles.css">
</head>
<body class="selection:bg-primary selection:text-void relative min-h-screen">

  <!-- Custom Cursor Elements -->
  <div id="custom-cursor" class="custom-cursor">
    <div id="cursor-arrow" class="cursor-element" style="display: block;">
      <svg width="24" height="24" viewBox="0 0 100 100" fill="#22c55e" style="filter: drop-shadow(0 0 6px rgba(34, 197, 94, 0.8));">
        <path d="M22.917,13.375L74.25,64.708l-19.03,-3.781l14.863,23.031l-8.833,8.834l-14.863,-23.032l-4.387,27.198l-19.083,-83.583Z" />
      </svg>
    </div>
    <div id="cursor-ibeam" class="cursor-element" style="display: none;">
      <svg width="18" height="24" viewBox="0 0 83 83" fill="none" stroke="#22c55e" stroke-width="10" stroke-linecap="round" style="filter: drop-shadow(0 0 6px rgba(34, 197, 94, 0.8));">
        <path d="M43 71h11M43 12h11M25.5 71h11m-11-59h11m3.5 5v50" />
      </svg>
    </div>
  </div>

  <!-- Root React Mounting Node -->
  <div id="root"></div>

  <!-- Main React System script -->
  <script type="module" src="./merge_later/App.js"></script>

  <!-- Vanilla pointer coordinate controller script -->
  <script type="module" src="./merge_later/CustomCursor.js"></script>
</body>
</html>
